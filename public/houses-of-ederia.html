    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">

    <script src="https://kit.fontawesome.com/dc61b6198d.js" crossorigin="anonymous"></script>
</head>
<body class="houses-page cc-subpage">

    <!-- Royal Header -->
    <header class="royal-header" role="banner">
        <div class="container">
            <div class="court-logo">
                <a href="/crimson-court" class="return-court">
                    <img src="assets/images/cc-logo.png" alt="The Crimson Court" class="cc-logo-image">
                </a>
            </div>
            <nav class="court-nav" role="navigation" aria-label="Crimson Court navigation">
                <ul>
                    <li><a href="/crimson-court" class="court-nav-item"><i class="fas fa-crown"></i> <span>Court Portal</span></a></li>
                    <li><a href="/" class="court-nav-item"><i class="fas fa-home"></i> <span>Main Site</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Heraldic Banner -->
    <div class="heraldic-banner">
        <div class="banner-emblem">
            <div class="royal-crest cc-icon-image"></div>
        </div>
        <h1 class="royal-title">The Houses of Ederia</h1>
        <p class="royal-subtitle">Six Houses, One Kingdom</p>
    </div>

    <!-- Shield Hall Main -->
    <main class="hall-main">

        <!-- Hall instruction -->
        <p class="hall-prompt"><i class="fas fa-info-circle"></i> Select a banner to learn about that house</p>

        <!-- Hanging Rod -->
        <div class="hall-rod" aria-hidden="true">
            <div class="rod-bar"></div>
            <div class="rod-end left"></div>
            <div class="rod-end right"></div>
        </div>

        <!-- Six Hanging Banners -->
        <div class="banners-row" role="list" aria-label="Houses of Ederia">

            <!-- House Falkrest -->
            <button class="house-banner" data-house="falkrest" role="listitem"
                    aria-label="House Falkrest — Beyond the Horizon"
                    style="--house-top:#3A7734; --house-bot:#2d5c28; --house-glow:rgba(58,119,52,0.4);">
                <div class="banner-ring"></div>
                <div class="banner-body">
                    <img src="assets/images/houses/falkrest-shield.png" alt="" class="banner-shield">
                    <span class="banner-house-name">House Falkrest</span>
                    <span class="banner-motto">"Beyond the Horizon"</span>
                </div>
            </button>

            <!-- House Veltaris -->
            <button class="house-banner" data-house="veltaris" role="listitem"
                    aria-label="House Veltaris — Through Storms, We Prevail"
                    style="--house-top:#1A4B82; --house-bot:#123660; --house-glow:rgba(26,75,130,0.4);">
                <div class="banner-ring"></div>
                <div class="banner-body">
                    <img src="assets/images/houses/veltaris-shield.png" alt="" class="banner-shield">
                    <span class="banner-house-name">House Veltaris</span>
                    <span class="banner-motto">"Through Storms, We Prevail"</span>
                </div>
            </button>

            <!-- House Thornefield -->
            <button class="house-banner" data-house="thornefield" role="listitem"
                    aria-label="House Thornefield — From the Land, Prosperity"
                    style="--house-top:#7A6030; --house-bot:#5c4820; --house-glow:rgba(122,96,48,0.4);">
                <div class="banner-ring"></div>
                <div class="banner-body">
                    <img src="assets/images/houses/thornefield-shield.png" alt="" class="banner-shield">
                    <span class="banner-house-name">House Thornefield</span>
                    <span class="banner-motto">"From the Land, Prosperity"</span>
                </div>
            </button>

            <!-- House Astralor -->
            <button class="house-banner" data-house="astralor" role="listitem"
                    aria-label="House Astralor — Knowledge is Power"
                    style="--house-top:#1a6060; --house-bot:#134848; --house-glow:rgba(26,96,96,0.4);">
                <div class="banner-ring"></div>
                <div class="banner-body">
                    <img src="assets/images/houses/astralor-shield.png" alt="" class="banner-shield">
                    <span class="banner-house-name">House Astralor</span>
                    <span class="banner-motto">"Knowledge is Power"</span>
                </div>
            </button>

            <!-- House Eldran -->
            <button class="house-banner" data-house="eldran" role="listitem"
                    aria-label="House Eldran — By Right of Blood"
                    style="--house-top:#5B3F8A; --house-bot:#3d2960; --house-glow:rgba(91,63,138,0.4);">
                <div class="banner-ring"></div>
                <div class="banner-body">
                    <img src="assets/images/houses/eldran-shield.png" alt="" class="banner-shield">
                    <span class="banner-house-name">House Eldran</span>
                    <span class="banner-motto">"By Right of Blood"</span>
                </div>
            </button>

            <!-- House Emberlyn -->
            <button class="house-banner" data-house="emberlyn" role="listitem"
                    aria-label="House Emberlyn — Faith Forged in Fire"
                    style="--house-top:#8B3030; --house-bot:#6b2020; --house-glow:rgba(139,48,48,0.4);">
                <div class="banner-ring"></div>
                <div class="banner-body">
                    <img src="assets/images/houses/emberlyn-shield.png" alt="" class="banner-shield">
                    <span class="banner-house-name">House Emberlyn</span>
                    <span class="banner-motto">"Faith Forged in Fire"</span>
                </div>
            </button>

        </div><!-- .banners-row -->

        <!-- House Detail Panel (hidden until a banner is clicked) -->
        <div class="house-detail" id="house-detail" aria-hidden="true">
            <button class="detail-close" aria-label="Close house details"><i class="fas fa-times"></i></button>

            <div class="detail-inner">
                <!-- Left: shield + lord portrait -->
                <div class="detail-visual">
                    <img src="" alt="" class="detail-shield-img" id="detail-shield">
                    <div class="detail-lord-wrap">
                        <img src="" alt="" class="detail-lord-img" id="detail-lord-img">
                        <p class="detail-lord-title" id="detail-lord-title"></p>
                    </div>
                </div>

                <!-- Right: text content -->
                <div class="detail-content">
                    <h2 class="detail-name" id="detail-name"></h2>
                    <p class="detail-motto" id="detail-motto"></p>

                    <div class="detail-basics" id="detail-basics"></div>

                    <div class="detail-body" id="detail-body"></div>

                    <!-- Location image at bottom -->
                    <div class="detail-location">
                        <img src="" alt="" class="detail-location-img" id="detail-location-img">
                        <p class="detail-location-caption" id="detail-location-caption"></p>
                    </div>
                </div>
            </div>
        </div><!-- .house-detail -->

    </main>

    <!-- Royal Footer -->
    <footer class="royal-footer">
        <div class="container">
            <div class="royal-decree">
                <p>The six great houses of Ederia, bound by honor, tradition, and oath to the Crown.</p>
                <div class="royal-seal"></div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/crimson-court.js"></script>
    <script src="js/houses-of-ederia.js"></script>
</body>
</html>
